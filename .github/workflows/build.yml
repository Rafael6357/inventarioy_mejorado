name: Build and Release Tauri App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Set Version from Tag
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "Setting version to $VERSION"
            # Update tauri.conf.json version only
            sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
            # Update Cargo.toml version only
            sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
            # Update App.tsx version only
            sed -i "s/const \[appVersion, setAppVersion\] = useState('[^']*')/const [appVersion, setAppVersion] = useState('$VERSION')/" src/App.tsx
          fi

      - name: Ensure WebView2 embedBootstrapper
        shell: bash
        run: |
          # Verify embedBootstrapper is set in tauri.conf.json
          if grep -q '"type": "embedBootstrapper"' src-tauri/tauri.conf.json; then
            echo "✓ WebView2 embedBootstrapper already configured"
          else
            echo "Adding WebView2 embedBootstrapper to tauri.conf.json"
            # Use node to safely update the JSON
            node -e "
              const fs = require('fs');
              const config = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
              if (!config.bundle.windows) config.bundle.windows = {};
              config.bundle.windows.webviewInstallMode = { type: 'embedBootstrapper' };
              fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(config, null, 2) + '\n');
            "
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'InventarioY ${{ github.ref_name }}'
          releaseBody: 'Actualización automática generada por GitHub Actions.'
          releaseDraft: false
          prerelease: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: inventarioy-exe
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn